# Dependabot — automated dependency-update PRs.
# Minor/patch grouped weekly (low-noise); security updates open immediately
# once "Dependabot security updates" is enabled in repo Settings →
# Code security & analysis. Auto-merge of green minor/patch PRs is handled by
# the Playwright smoke suite gate (see .github/workflows/) once it lands.
version: 2
updates:
  # Web app (Next.js)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "03:00"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies"]

  # Mobile app (Expo / React Native)
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "03:00"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies", "mobile"]

  # Desktop shell (Tauri / Rust)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "03:00"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies", "desktop"]

  # GitHub Actions workflow pins
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "03:00"
    labels: ["dependencies", "ci"]
