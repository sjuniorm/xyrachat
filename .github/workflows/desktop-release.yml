name: Desktop release

# Builds + signs the Tauri desktop app for macOS (Apple Silicon + Intel) and
# Windows, and publishes a (draft) GitHub Release with the installers + the
# updater manifest (latest.json). Bump `version` in src-tauri/tauri.conf.json,
# then either push a tag `desktop-vX.Y.Z` or run this workflow manually.

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Only installs @tauri-apps/cli — the frontend is the remote web app
      # (tauri.conf.json frontendDist points at the deployed URL), so there's
      # no Next.js build step here.
      - name: Install npm deps
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (required for auto-update). Generate once with
          # `npm run tauri signer generate` and store as repo secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization (optional until you have an Apple
          # Developer account — builds still produce an unsigned .dmg without these).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: desktop-v__VERSION__
          releaseName: "Xyra Chat Desktop v__VERSION__"
          releaseBody: "Download the installer for your platform below. Existing installs auto-update."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
