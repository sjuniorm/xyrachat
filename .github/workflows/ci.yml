name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Lint is ADVISORY for now: there's a pre-existing eslint backlog (the gate
      # was added after the codebase grew). It still runs + annotates, but won't
      # fail the build while we clear the debt. Flip continue-on-error off once
      # `npm run lint` is clean. Typecheck above remains the hard correctness gate.
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true

  # NOTE: the production build is intentionally NOT duplicated here — Vercel
  # builds the app on every push/PR (preview + production deploys), so that is
  # the build gate. This job stays fast + deterministic (no app env needed).
